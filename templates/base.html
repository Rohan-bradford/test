<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Marshfield School History</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body class="{% if is_child_page %}child-page{% endif %}">
  <main class="page">
    <header>
      <h1>{{ page_title }}</h1>
    </header>
    <div class="hero" style="background-image: url('{{ hero_image_url }}');" aria-label="School background image"></div>
    <nav>
      {% for label, target in nav %}
      <a href="{{ url_for('render_page', page=target) }}" class="{% if current_page == target %}active{% endif %}">{{ label }}</a>
      {% endfor %}
    </nav>
    {% block content %}{% endblock %}
    <section class="page-controls">
      <a href="javascript:history.back()">Previous page</a>
      <a href="javascript:history.forward()">Next page</a>
      <a href="{{ url_for('render_page', page=home_target) }}">Home</a>
    </section>
    <footer>Community History Research by Ray Greenhough</footer>
  </main>
</body>
</html>
